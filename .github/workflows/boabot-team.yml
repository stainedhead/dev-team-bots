name: boabot-team

on:
  push:
    branches: [main]
    paths:
      - 'boabot-team/**'
      - '.github/workflows/boabot-team.yml'
  pull_request:
    branches: [main]
    paths:
      - 'boabot-team/**'
      - '.github/workflows/boabot-team.yml'

jobs:
  validate:
    name: Validate team config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          python3 -c "
          import yaml, glob, sys
          files = (
              glob.glob('boabot-team/team.yaml') +
              glob.glob('boabot-team/bots/*/config.yaml')
          )
          if not files:
              print('ERROR: no YAML files found under boabot-team/')
              sys.exit(1)
          for f in files:
              try:
                  yaml.safe_load(open(f))
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'FAIL: {f}: {e}')
                  sys.exit(1)
          print(f'Validated {len(files)} file(s).')
          "
