name: boabotctl

on:
  push:
    branches: [main]
    paths:
      - 'boabotctl/**'
      - '.github/workflows/boabotctl.yml'
    tags:
      - 'boabotctl/v*'
  pull_request:
    branches: [main]
    paths:
      - 'boabotctl/**'
      - '.github/workflows/boabotctl.yml'

defaults:
  run:
    working-directory: boabotctl

env:
  GO_VERSION: '1.26'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: boabotctl/go.sum

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run

      - name: Test
        run: go test -race ./...

      - name: Coverage check
        run: |
          go test -coverprofile=coverage.out ./internal/commands/... ./internal/client/...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Commands+Client Coverage: ${COVERAGE}%"
          awk "BEGIN { if ($COVERAGE < 80) { print \"Coverage ${COVERAGE}% is below 80% threshold\"; exit 1 } }"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: boabotctl/go.sum

      - name: Build (verify compilation)
        run: go build -o bin/boabotctl ./cmd/boabotctl

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/boabotctl/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: boabotctl/go.sum

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/boabotctl/}" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-X main.version=${{ steps.version.outputs.version }}" -o dist/boabotctl-darwin-arm64  ./cmd/boabotctl
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-X main.version=${{ steps.version.outputs.version }}" -o dist/boabotctl-darwin-amd64  ./cmd/boabotctl
          GOOS=linux   GOARCH=amd64 go build -ldflags="-X main.version=${{ steps.version.outputs.version }}" -o dist/boabotctl-linux-amd64   ./cmd/boabotctl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: boabotctl ${{ steps.version.outputs.version }}
          files: boabotctl/dist/*
          generate_release_notes: true
