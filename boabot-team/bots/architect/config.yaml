# Architect bot configuration

bot:
  name: architect
  type: architect

models:
  default: ollama-chat
  providers:
    - name: ollama-chat
      type: openai
      model_id: qwen3.6:35b-a3b-coding-bf16
      endpoint: http://localhost:11434/v1

tools:
  allowed_tools:
    - read_file
    - list_dir
    - glob
    - grep
    - write_file
    - edit_file
    - memory_search
    - send_message
    - read_messages
    - todo_write
    - todo_read
    - http_request
  http_allowed_hosts:
    - api.github.com
  receive_from:
    - orchestrator

budget:
  token_spend_daily: 1000000
  tool_calls_hourly: 500

context:
  threshold_tokens: 150000
