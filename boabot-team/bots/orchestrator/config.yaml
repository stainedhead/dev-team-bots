# Orchestrator bot configuration

bot:
  name: orchestrator
  type: orchestrator

orchestrator:
  enabled: true
  api_port: 8080
  web_port: 8081

models:
  default: bedrock-claude
  providers:
    - name: bedrock-claude
      type: bedrock
      model_id: anthropic.claude-sonnet-4-6
      region: us-east-1

aws:
  region: us-east-1
  sqs_queue_url: ""           # injected by CDK at deploy time
  sns_topic_arn: ""           # injected by CDK at deploy time
  private_bucket: ""          # injected by CDK at deploy time
  team_bucket: ""             # injected by CDK at deploy time
  dynamodb_budget_table: ""   # injected by CDK at deploy time

tools:
  allowed_tools:
    - read_file
    - list_dir
    - memory_search
    - send_message
    - read_messages
    - todo_write
    - todo_read
    - get_metrics
  receive_from:             # all team members may send action-triggering messages
    - architect
    - implementer
    - reviewer
    - maintainer

budget:
  token_spend_daily: 1000000
  tool_calls_hourly: 500

context:
  threshold_tokens: 150000
