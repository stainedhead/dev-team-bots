# Orchestrator bot configuration

bot:
  name: orchestrator
  type: orchestrator

orchestrator:
  enabled: true
  api_port: 8080
  web_port: 8081

models:
  default: claude
  providers:
    - name: claude
      type: anthropic
      model_id: claude-sonnet-4-6

tools:
  allowed_tools:
    - read_file
    - list_dir
    - memory_search
    - send_message
    - read_messages
    - todo_write
    - todo_read
    - get_metrics
  receive_from:
    - architect
    - implementer
    - reviewer
    - maintainer

budget:
  token_spend_daily: 1000000
  tool_calls_hourly: 500

context:
  threshold_tokens: 150000

memory:
  heap_warn_mb: 512
  heap_hard_mb: 1024
