# Orchestrator bot configuration

bot:
  name: orchestrator
  type: orchestrator

orchestrator:
  enabled: true
  api_port: 8080
  work_dirs:
    - /Users/iggybdda/Code
    - /tmp
  plugins:
    install_dir: /Users/iggybdda/Code/stainedhead/Golang/dev-team-bots/boabot/bin/plugins

models:
  default: ollama-chat
  providers:
    - name: ollama-chat
      type: openai
      model_id: qwen3.6:35b-a3b-coding-bf16
      endpoint: http://localhost:11434/v1
    - name: ollama-embed
      type: openai
      model_id: nomic-embed-text:v1.5
      endpoint: http://localhost:11434/v1

memory:
  embedder: ollama-embed
  heap_warn_mb: 512
  heap_hard_mb: 1024
