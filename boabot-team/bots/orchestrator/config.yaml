# Orchestrator bot configuration

bot:
  name: orchestrator
  type: orchestrator

orchestrator:
  enabled: true
  api_port: 8080
  web_port: 8081
  work_dirs:
    - /Users/iggybdda/Code
    - /tmp

models:
  default: ollama-chat
  chat_provider: ollama-gemma
  providers:
    - name: ollama-chat
      type: openai
      model_id: qwen3.6:35b-a3b-coding-bf16
      endpoint: http://localhost:11434/v1
    - name: ollama-gemma
      type: openai
      model_id: gemma4:31b
      endpoint: http://localhost:11434/v1
    - name: ollama-embed
      type: openai
      model_id: nomic-embed-text:v1.5
      endpoint: http://localhost:11434/v1

memory:
  embedder: ollama-embed
  heap_warn_mb: 512
  heap_hard_mb: 1024

tools:
  allowed_tools:
    - read_file
    - list_dir
    - memory_search
    - send_message
    - read_messages
    - todo_write
    - todo_read
    - get_metrics
    - run_command
  receive_from:
    - architect
    - implementer
    - reviewer
    - maintainer

budget:
  token_spend_daily: 1000000
  tool_calls_hourly: 500

context:
  threshold_tokens: 150000
