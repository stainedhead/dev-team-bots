# Reviewer bot configuration

bot:
  name: reviewer
  type: reviewer

models:
  default: ollama-chat
  chat_provider: ollama-gemma
  providers:
    - name: ollama-chat
      type: openai
      model_id: qwen3.6:35b-a3b-coding-bf16
      endpoint: http://localhost:11434/v1
    - name: ollama-gemma
      type: openai
      model_id: gemma4:31b
      endpoint: http://localhost:11434/v1

tools:
  allowed_tools:
    - read_file
    - list_dir
    - glob
    - grep
    - memory_search
    - send_message
    - read_messages
    - todo_write
    - todo_read
    - http_request
    - run_command
  http_allowed_hosts:
    - api.github.com
  receive_from:
    - orchestrator
    - tech-lead

budget:
  token_spend_daily: 1000000
  tool_calls_hourly: 500

context:
  threshold_tokens: 150000
