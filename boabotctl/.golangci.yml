version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - (database/sql.Rows).Close
        - (database/sql.DB).Close
        - (net/http.Response).Body.Close
        - os.Remove
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
